    Informe o novo nome: <input id="ipt_nome"> 
    <button onclick="alterar()">Alterar</button><br><br>
    <b>Assim está o vetor</b>

</body>
<script>
    var nomes = ['tom', 'bob', 'mel', 'dan'];
    div_txt.innerHTML = nomes;
    
    function alterar() {
        nomes[ipt_pos.value] = ipt_nome.value;
        div_txt.innerHTML = nomes;

    }
