<script>
    let alunos = [];

// ================= INCLUIR =================
function incluir(ra, nota) {

    if (ra >= 2000 && ra <= 3000) {

        if (nota >= 0 && nota <= 10) {
            alunos[alunos.length] = [ra, nota];
            mostrar1();
        }
    }else{
        output1.innerHTML = "RA ou nota inválidos!";
    }
}

// ================= EXCLUIR =================
function excluir(ra) {

    let achou = 0;

    for (let i = 0; i < alunos.length; i++) {

        if (alunos[i][0] == ra) {
            alunos.splice(i, 1);
            achou = 1;
        }
    }

    if (achou == 0) {
        alert("R.A não encontrado");
    }

    mostrar1();
}

// ================= ALTERAR =================
function alterar(ra, nova) {

    let achou = 0;

    for (let i = 0; i < alunos.length; i++) {

        if (alunos[i][0] == ra) {

            if (nova >= 0 && nova <= 10) {
                alunos[i][1] = nova;
            }

            achou = 1;
        }
    }

    if (achou == 0) {
        alert("R.A não encontrado");
    }

    mostrar1();
}

// ================= CONSULTA =================
function consultar(de, ate) {

    if (de <= ate) {

        let txt = "";
        let achou = 0;

        for (let i = 0; i < alunos.length; i++) {

            if (alunos[i][0] >= de && alunos[i][0] <= ate) {
                txt = txt + alunos[i][0] + " - " + alunos[i][1] + "<br>";
                achou = 1;
            }
        }

        if (achou == 0) {
            alert("Nada encontrado");
        }

        output2.innerHTML = txt;
    }
}

// ================= AJUSTE =================
function bonus(de, ate, pontos, percent) {
    ajustar("bonus", de, ate, pontos, percent);
}

function reduzir(de, ate, pontos, percent) {
    ajustar("reduzir", de, ate, pontos, percent);
}

function ajustar(tipo, de, ate, pontos, percent) {

    if (de <= ate) {

        let valor;
        let usarPercent = 0;

        if (pontos >= 0.5 && pontos <= 1.5) {
            valor = pontos;
        } else if (percent >= 3 && percent <= 13) {
            valor = percent;
            usarPercent = 1;
        } else {
            valor = Math.floor(Math.random() * 11) + 5;
            usarPercent = 1;
        }

        for (let i = 0; i < alunos.length; i++) {

            if (alunos[i][0] >= de && alunos[i][0] <= ate) {

                if (tipo == "bonus") {

                    if (usarPercent == 1) {
                        alunos[i][1] = alunos[i][1] + (alunos[i][1] * valor / 100);
                    } else {
                        alunos[i][1] = alunos[i][1] + valor;
                    }

                } else {

                    if (usarPercent == 1) {
                        alunos[i][1] = alunos[i][1] - (alunos[i][1] * valor / 100);
                    } else {
                        alunos[i][1] = alunos[i][1] - valor;
                    }
                }

                if (alunos[i][1] > 10) {
                    alunos[i][1] = 10;
                }

                if (alunos[i][1] < 0) {
                    alunos[i][1] = 0;
                }
            }
        }

        mostrar3();
    }
}

// ================= MOSTRAR =================
function mostrar1() {

    let txt = "";

    for (let i = alunos.length - 1; i >= 0; i--) {
        txt = txt + alunos[i][0] + " - " + alunos[i][1] + "<br>";
    }

    out1.innerHTML = txt;
}

function mostrar3() {

    let txt = "";

    for (let i = alunos.length - 1; i >= 0; i--) {
        txt = txt + alunos[i][0] + " - " + alunos[i][1] + "<br>";
    }

    out3.innerHTML = txt;
}

// ================= TELAS =================
function irConsulta() {
    TELa01.style.display = "none";
    TELa02.style.display = "block";
}

function irAjuste() {
    TELa01.style.display = "none";
    TELa03.style.display = "block";
}

function voltar() {
    TELa02.style.display = "none";
    TELa03.style.display = "none";
    TELa01.style.display = "block";
}
</script>
