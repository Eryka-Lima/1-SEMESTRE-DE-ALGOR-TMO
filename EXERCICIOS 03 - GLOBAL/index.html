<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósitos</title>
</head>

<body>
    <h2 style="background-color:#681ec9; color:white;">
        Olá, Nicollas!!!
    </h2>
    <p>Auxílio para Depósito e Retirada de Dinheiro</p>

    Inserir o Valor do Depósito:
    <input id="ipt_deposito" type="number"> <br>

    Inserir o Valor da retirada:
    <input id="ipt_retirada" type="number"> <br><br>

    <button style="background-color:#681ec9; color:white;"
        onclick="depositar()">DEPOSITAR</button><br><br>

    <button style="background-color:#681ec9; color:white;"
        onclick="retirar()">RETIRAR</button><br><br>

    <b>Extrato dos Depósitos</b><br>
    <div id="div_msg"></div>

<script>
    let ax_qtde = 0;
    let ax_total = 0;

    function depositar() {
        let valor = Number(ipt_deposito.value);
        if (!valor) return;

        ax_qtde++;
        ax_total += valor;

        div_msg.innerHTML += `${ax_qtde}º depósito de R$ ${valor.toFixed(2)}.
        Total: R$ ${ax_total.toFixed(2)}<br>`;

        ipt_deposito.value = '';
    }

    function retirar() {
        let valor = Number(ipt_retirada.value);
        if (!valor) return;

        ax_total -= valor;

        div_msg.innerHTML += `Retirada de R$ ${valor.toFixed(2)}.
        Total: R$ ${ax_total.toFixed(2)}<br>`;

        ipt_retirada.value = '';
    }
</script>
</body>
</html>
