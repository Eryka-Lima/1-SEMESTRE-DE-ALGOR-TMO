<body>

    <button onclick="receber()">Receber 100</button> <br>
    <button onclick="pagar()">Pagar 50</button> <br><br>

    <b>Extrato dos Depósitos</b> <br>
    <div id="div_msg"></div>

</body>

<script>

     let ax_qtde = 0;
    
    function depositar() {
            let ax_total = 0;
            ax_qtde = ax_qtde + 1;
            ax_total = ax_total + Number(100);

            
            div_msg.innerHTML += `Transferência de R$ 100,00 recebida!
            Seu saldo atual é de R$ ${ax_total.toFixed(2)}<br>`;  
        }

</script>
