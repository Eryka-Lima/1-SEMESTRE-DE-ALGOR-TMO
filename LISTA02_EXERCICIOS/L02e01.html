<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 01</title>
</head>
<body>
    <h2>Cadastro de Local e Nascimento</h2>
        Entre com a Cidade Natal:
    <input id="ipt_cidade" type="text"> <br>
        Entre com o seu Ano de Nascimento:
    <input id="ipt_anonasc"> <br>
    <button onclick="mostrar_dois()">CADASTRAR </button>
</body>
</html>
<script>
    function mostrar_dois () {

        alert ("Você nasceu na cidade :"  +  ipt_cidade.value + "e o ano é: " + 
        ipt_anonasc.value);
    }
</script>
