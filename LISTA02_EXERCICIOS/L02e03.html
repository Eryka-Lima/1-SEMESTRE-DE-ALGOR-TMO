<body>
    <h2>Futebol</h2> <br>
        Entre com nome do Time:
    <input id="ipt_time" type="text"> <br>

      <button onclick="mostrar_dois()">Amo meu time </button>

        alert ("O time" + ipt_time.value + " tem " + 
        ipt_qnttitulo.value + "titulos");
    }
</script>
