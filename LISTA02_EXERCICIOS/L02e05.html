<body>

     <button onclick="mostrar_avo()">Opinião da Avó</button>

<script>
    function mostrar_avo() {
        alert("Muito bem, que neto inteligente, porque tirou" + ipt_nota.value);

    function mostrar_mae() {

        alert("Não fez mais que tua obrigação com essa nota" + ipt_nota.value);
    }
    function mostrar_dois() {

        alert("Sua nota foi" + ipt_nota.value);
    }
</script>
