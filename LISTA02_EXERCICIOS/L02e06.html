<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 06</title>
</head>

<body  style="background-color:#b4e6f5;">
    <h2 style="background-color: #771b72; color: rgb(252, 249, 249);">PARE, PENSE e SIGA</h2>
    <button style="background-color: #cf1313; color: rgb(252, 248, 248);" onclick="mostrar('vermelho')">VERMELHO</button>
    <div id="div_vermelho"></div> <br>

    <button style="background-color: #cbe653; color: rgb(252, 248, 248);" onclick="mostrar('amarelo')">AMARELO</button>
    <div id="div_amarelo"></div> <br>

    <button style="background-color: #05530c; color: rgb(252, 249, 249);" onclick="mostrar('verde')">VERDE</button>
    <div id="div_verde"></div> <br>
</body>

<Script>
    function mostrar(cor) {

        document.getElementById("div_vermelho").innerHTML = "";
        document.getElementById("div_amarelo").innerHTML = "";
        document.getElementById("div_verde").innerHTML = "";

        if (cor === "vermelho") {
            document.getElementById("div_vermelho").innerHTML = "PARE E AGUARDE"
        }

        if (cor === "amarelo") {
            document.getElementById("div_amarelo").innerHTML = "Pense se pode seguir ou se deve parar!";
        }

        if (cor === "verde") {
            document.getElementById("div_verde").innerHTML = "Pode seguir adiante!";
        }
    }


</Script>

</html>
