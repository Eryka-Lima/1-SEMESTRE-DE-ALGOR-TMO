<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 02</title>
</head>

<body style="background-color:#bfdbe0;">
    <h2>APOSENTADORIA: QUANTO FALTA?</h2>
    Para calcular precisamos de alguns dados, preencha os campos: <br>
    Nome: <input  id= "ipt_nome"> <br>
    Idade: <input id="ipt_idade"> <br><br>

    <button style="background-color: #6b35ce; color: rgb(252, 248, 248);" 
    onclick="mostrar('homem')">APOSENTADORIA HOMEM</button>
    <div id="div_hom"></div> <br>

    <button style="background-color: #6b35ce; color: rgb(252, 248, 248);" 
    onclick="mostrar('mulher')">APOSENTADORIA MULHER</button>
    <div id="div_mul"></div> <br>

</body>

<Script>
    function mostrar(aposen) {

        document.getElementById("div_hom").innerHTML = "";
        document.getElementById("div_mul").innerHTML = "";

         if (aposen === "homem") {
            let num1 = 70;
            let num2 = Number(ipt_idade.value);

            let resultado = num1 - num2;
            
            document.getElementById("div_hom").innerHTML = "Olá,  " + ipt_nome.value + "você tem " + ipt_idade.value + 
            " anos, e Falta " + resultado + " anos, para você se aposentar!";
        }

        if (aposen === "mulher") {
             let num3 = 60;
            let num4 = Number(ipt_idade.value);

            let resultado = num3 - num4;
            document.getElementById("div_mul").innerHTML = "Olá,  " + ipt_nome.value + "você tem " + ipt_idade.value + 
            " anos, e Falta " + resultado + " anos, para você se aposentar!";
        }
    }


</Script>
</html>
