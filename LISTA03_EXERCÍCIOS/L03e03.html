<body style="background-color:#bfdbe0;">

    Número: <input id="ipt_num2"> <br><br>

    <button style="background-color: #6b35ce; color: rgb(252, 248, 248);"

    <button style="background-color: #6b35ce; color: rgb(252, 248, 248);"

</body>

<Script>

        document.getElementById("div_resto").innerHTML = "";
        document.getElementById("div_completo").innerHTML = "";



        if (operacoes === "quociente") {

            document.getElementById("div_quociente").innerHTML = "A diferença de " + ipt_num1.value  + " /" + ipt_num2.value + " = " + resultado

            " é o segundo e " + resultado + " é o quociente da divisão";
        }

        if (operacoes === "resto") {
             let num5 = Number(ipt_num1.value);
            let num6 = Number(ipt_num2.value);

            let resultado2 = num5 / num6;
            document.getElementById("div_resto").innerHTML = 
            "O produto de " + ipt_num1.value  + " / " + ipt_num2.value + " = " + resultado2 +
            " O resto da divisão de " +  ipt_num1.value + " por "  + ipt_num2.value +  " é: " + resultado2 + 
            ", sendo que " +  ipt_num1.value + " é o primeiro número recebido," +  ipt_num1.value + " é o segundo e " + resultado2 
             " é o resto da divisão.";
        }

        if (operacoes === "completo") {
            let num7 = Number(ipt_num1.value);
            let num8 = Number(ipt_num2.value);

            let resultado = num7 / num8;
            document.getElementById("div_completo").innerHTML = 
            "A divisão de " + ipt_num1.value + " por " +  ipt_num1.value + " é: " + resultado + "e o resto dessa divisão é: " +
            resultado2 + " , sendo que " + ipt_num1.value + "  é o primeiro número recebido, " + ipt_num1.value + 
            " é o segundo, " + resultado + " é o quociente da divisão e" + resultado2 + " é o resto dessa divisão";

        }

    }


</Script>
