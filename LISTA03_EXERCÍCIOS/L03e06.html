<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 06</title>
</head>
<body style="background-color:#62a2eb;">
    <h2 style="background-color: #681ec9; color: rgb(252, 248, 248);">NOTA DE ATIVIDADE AVALIATIVA</h2>
    Você é estudante, vamos ver suas notas?<br>
    Nome do Aluno: <input  id= "ipt_nome"> <br><br>
    Avaliativa 01: <input  id="ipt_avaliacao1"> <br>
    Avaliativa 02: <input  id="ipt_avaliacao2"> <br>
    Avaliativa 03: <input  id="ipt_avaliacao3"> <br><br><br>

    <button style="background-color: #681ec9; color: rgb(252, 248, 248);" 
    onclick="mostrar('media')">MOSTRAR NOTA</button>
    <div id="div_media"></div> <br>

</body>

<Script>
    function mostrar(operacoes) {

        document.getElementById("div_media").innerHTML = "";

    
        if (operacoes === "media") {
            let num1 = Number(ipt_avaliacao1.value);
            let num2 = Number(ipt_avaliacao2.value);
            let num3 = Number(ipt_avaliacao3.value);
            let num4 = 3;

            let resultado = num1 + num2 + num3;
            let resultado2 = resultado / num4;
        
            document.getElementById("div_media").innerHTML = "A soma das suas três atividades é: " +  resultado + "    Então, com isso sua média é      " +
                 ipt_nome.value + " , a média das suas atividades é: " +  resultado2; 

        ipt_avaliacao1.value = '';
        ipt_avaliacao2.value = '';
        ipt_avaliacao3.value = '';
        }
    }


</Script>
</html>
