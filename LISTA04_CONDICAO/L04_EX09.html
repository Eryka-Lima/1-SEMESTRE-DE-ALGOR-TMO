<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><h1>EXERCICIO 09</h1></title>
</head>
<body>
    <h2>CONTROLE DE PESO DO ELEVADOR</h2>
    Quantos homens entraram no elevador? <input id="ipt_homem"> <br>
    Quantas mulheres entraram no elevador? <input id="ipt_mulher"> <br><br>

    <button onclick="analisar()">ANALISAR PESO</button> <br>
    <div id="div_msg"></div>
    
</body>

<script>

    function analisar() {
        let resultadoh = ipt_homem.value * 80;
        let resultadom = ipt_mulher.value * 60;
        let resultado = resultadoh + resultadom;

        if(resultado > 800) {
            div_msg.innerHTML = `Será necessário que alguém desça para que o elevador se movimente`;

        } else {
            div_msg.innerHTML = `Este elevador suporta 800 Kg e o peso estimado desta lotação é de ${resultado}g`;
        }
    }



</script>
</html>
