<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 06</title>
</head>
<body>
    <h2>CONTA DE LUZ</h2>
    
    Qual a quantidade de KWh: <input id="ipt_kwh"> <br><br>
    <button style="background-color: #6b35ce; color: rgb(252, 248, 248);" onclick="analisar()">CALCULAR CONTA DE LUZ</button> <br>
    <div id="div_msg"></div>
   
</body>
</html>

<script>
    function analisar() {

        let n1 = Number(ipt_kwh.value);
        let resultado = n1 * .85;

        div_msg.innerHTML = '';


        if (ipt_kwh.value >= 100) {
            let desconto = resultado * .10;
            let res = resultado - desconto
           div_msg.innerHTML = `Você tem um desconto de ${desconto} sua conta é de ${res}.`;

        } else {
            div_msg.innerHTML = ` Valor à ser PAGO da conta de Luz é ${resultado}.`;
        }
    }
</script>
