<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 07</title>
</head>
<body>
    <h2>FINANCIAMENTO CASAS PRÓPRIA</h2>
    Qual o valor da renda da família: <input id="ipt_renda"> <br>
    Qual o valor da prestação: <input id="ipt_parcela"> <br><br>
    <button style="background-color: #6b35ce; color: rgb(252, 248, 248);" onclick="analisar()">VERIFICAR FINANCIAMENTO</button> <br>
    <div id="div_msg"></div>
   
</body>
</html>

<script>
    function analisar() {

        let renda = Number(ipt_renda.value);
        let parcela = Number(ipt_parcela.value);
        let valor = (parcela / renda)  * 100;

        div_msg.innerHTML = '';


        if (valor >= 30) {
           div_msg.innerHTML = `A prestação corresponde à ${valor} % da renda.`;

        } else {
            div_msg.innerHTML = '';

        }
    }
</script>
