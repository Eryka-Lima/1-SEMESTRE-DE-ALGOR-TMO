<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 08</title>
</head>
<body>
    <h2>CHEQUE ESPECIAL</h2>
    Valor da conta: <input id="ipt_conta"> <br>
    Valor do débito: <input id="ipt_debito"> <br><br>
    <button style="background-color: #6b35ce; color: rgb(252, 248, 248);" 
    onclick="analisar()">ANÁLISAR CONTA</button> <br>
    <div id="div_msg"></div>
   
</body>
</html>

<script>

    function analisar() {

        let conta = Number(ipt_conta.value);
        let debito = Number(ipt_debito.value);
        let saldo = conta - debito;

        div_msg.innerHTML = '';


        if (saldo >= 0) {
           div_msg.innerHTML = `O saldo atual da conta corrente é ${saldo}.`;

        } else {
            div_msg.innerHTML = `O saldo atual da conta corrente é NEGATICO ${saldo}.`;;

        }

    }


</script>
