<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXERCICIO 06</title>
</head>
<body>
    <h1>Filmes em Cores: Azul e Vermelho Alternados</h1>
    Qual filmes você gosta: <input id="ipt_filmes"> <br>
    <button onclick="cadastro()">CADASTRAR</button><br><br>
    <div id="msg"></div>
    
</body>
<script>

    let ordem = 0;

    function cadastro(){
        let favorito = ipt_filmes.value;
        ordem++;

        msg.innerHTML += `<b style="color: red">${ordem}° Filme cadastrado: ${favorito}</b>. <br>`;
        msg.innerHTML += `<b style="color: blue">${ordem}° Filme cadastrado: ${favorito}</b>. <br>`;
    }
</script>
</html>
