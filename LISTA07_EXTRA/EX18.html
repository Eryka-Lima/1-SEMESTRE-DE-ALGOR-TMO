<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 18</title>
</head>

<body>

    <h1>Divisores</h1>
    Informe um número do usuário, que deve estar entre 0 e 100;
    <input id="ipt_num" placeholder="Número (0 a 100)"><br>
    <button onclick="divisores()">Ver Divisores</button>

    <div id="res"></div>

</body>

</html>


<script>
    function divisores() {
        let n = Number(ipt_num.value);
        let texto = `Divisores do Número ${n}:<br>`;

        for (let i = 1; i <= n; i++) {
            if (n % i === 0) {
                texto += i + "<br>";
            }
        }

        res.innerHTML = texto;
    }
</script>
