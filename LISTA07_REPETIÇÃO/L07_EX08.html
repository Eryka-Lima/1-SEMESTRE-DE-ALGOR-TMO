<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 08</title>
</head>

<body>
    <h2>8. Múltiplos de 5</h2>
    <input id="num5" type="number">
    <button onclick="mult5()">Ver</button>
    <div id="res8"></div>

</body>

</html>

<script>

    function mult5() {
        let n = Number(num5.value);
        let i = 0, txt = "";
        while (i <= n) {
            if (i % 5 == 0 && i != 0) {
                txt += i + "<br>";
            }
            i++;
        }
        res8.innerHTML = txt;
    }
 
</script>
