<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 12</title>
</head>

<body>

    <h2>12. Papagaio</h2>
    Insira um número: <br>
    <input id="nPap" type="number"><br>
    Insira uma frase para repetir:<br>
    <input id="frasePap"><br>

    <button onclick="papagaio()">Papagaio</button>


</body>

</html>

<script>

    function papagaio() {
        let n = Number(nPap.value);
        let f = frasePap.value;
        let i = 1;
        while (i <= n) {
            alert(f + " " + f);
            i++;
        }
    }

</script>
