<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musculação</title>
</head>
<body>
    De quantos em quantos dias você treina:     <input id="ipt_dias"> <br>
    <button onclick="calc()">Exibir Rotina Mensal</button>

    <div id="msg"></div>
</body>
<script>
    function calc(){
        let dias = Number(ipt_dias.value)
        let comer = 0
        let contador = 1
        while(contador <= 30){
            msg.innerHTML += `Dia ${contador} - Musculação <br>`
            comer = 0
            contador += 1
            while(comer < dias){
                msg.innerHTML += `Dia ${contador} - Comer, descansar e dormir <br>`
                comer += 1
                contador += 1
            }
        }
    }
   
   

</script>
</html>
