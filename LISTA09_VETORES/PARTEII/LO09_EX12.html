<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>EXERCICIO 12</title>
</head>

<body>

    <h2>Cadastro de Filhos</h2>

    <!-- Entrada -->
    <input id="input_nome" placeholder="Nome do filho">
    <button onclick="cadastrar()">Cadastrar</button>

    <br><br>

    <button onclick="atualizar()">Atualizar Família</button>

    <!-- Resultado -->
    <div id="resultado"></div>

</body>

</html>

<script>
    let filhos = [];

    function cadastrar() {
        let nome = input_nome.value.trim();

        if (nome === "") {
            alert("Digite um nome válido!");
            return;
        }

        // Verificar repetição
        if (filhos.includes(nome)) {
            alert("Não pode mais de 1 filho com o mesmo nome!");
            return;
        }

        filhos.push(nome);
        input_nome.value = "";
    }

    function atualizar() {
        let quantidade = filhos.length;
        let custoParticular = quantidade * 3000;
        let custoPublico = quantidade * 1500;

        resultado.innerHTML = `
      Você tem ${quantidade} filhos<br>
      Seu custo mensal será aproximadamente R$${custoParticular.toFixed(2)} se colocá-los em escola particular<br>
      ou R$${custoPublico.toFixed(2)} se eles estudarem em escola pública
    `;
    }
</script>
