<body>

    <h1>Crie um programa o qual: </h1>
    <br>

    <button onclick="sortear()">Sortear</button><br><br>
    <div id="output"></div>

</body>

<script>


    function sortear() {

        let numero = Math.random();

        if (numero >= 0.5) {
            output.innerHTML += `Número sorteado ${numero}<br> Eu arredondaria para 1 <br><hr>`;
        }else{
            output.innerHTML += ` Número sorteado ${numero}<br> Eu arredondaria para 0 <br><hr>`;
        }


    }
</script>
