<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXERCICIO 07</title>
</head>

<body>

    <h1>Alterando e Eliminando elementos do vetor</h1>
    Controle de Receita

    Número do produto:<br>
    <input id="input_produto"><br>

    Valor do produto:<br>
    <input id="input_valor"><br>

    <button onclick="registrar()">Registrar</button><br><br>

    <div id="output"></div>

</body>

</html>

<script>

    let produtos = [];
let valores = [];

function registrar() {

    let numero = Number(input_produto.value);
    let valor = Number(input_valor.value);

    // validações
    if (numero < 6000 || numero > 7000) {
        alert('Número do produto deve estar entre 6000 e 7000');
        return;
    }

    if (valor <= 10 || valor >= 1000) {
        alert('Valor deve ser maior que 10 e menor que 1000');
        return;
    }

    let existe = false;

    for (let i = 0; i < produtos.length; i++) {
        if (produtos[i] == numero) {
            valores[i] = valor; // altera
            existe = true;
            break;
        }
    }

    if (existe == false) {
        produtos.push(numero);
        valores.push(valor);
    }

    output.innerHTML = '';

    for (let i = 0; i < produtos.length; i++) {
        output.innerHTML += `Produto ${produtos[i]}: R$ ${valores[i]}<br>`;
    }
}


</script>
