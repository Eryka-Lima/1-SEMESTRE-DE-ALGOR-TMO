<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Jogo de Dados</title>
</head>

<body>

    <h1>JOGO DE DADOS</h1>

    Número escolhido (1 a 6):
    <input id="dado"><br><br>

    Quantidade de rodadas (10 a 20):
    <input id="rodadas"><br><br>

    <button onclick="jogar()">JOGAR</button>

    <div id="output"></div>

</body>

</html>

<script>

function jogar() {

    let n = Number(dado.value);
    let r = Number(rodadas.value);

    let pontosUsuario = 0;
    let pontosMaquina = 0;

    let partidas = []; //guarda todas as rodadas

    output.innerHTML = "";

    if (n < 1 || n > 6) {
        alert("Escolha um número entre 1 e 6!");
        return;
    }

    if (r < 10 || r > 20) {
        alert("A quantidade de rodadas deve ser entre 10 e 20!");
        return;
    }

    for (let i = 1; i <= r; i++) {

        let resultado = Math.floor(Math.random() * 6) + 1;

        let msg = "";

        if (resultado == n) {
            pontosUsuario += n * 5;
            msg = "Usuário ganhou!";
        } else {
            pontosMaquina += resultado * 1;
            msg = "Máquina ganhou!";
        }

        //salva tudo no array
        partidas.push(`
            <b>${i}ª Rodada</b><br>
            Número sorteado: ${resultado}<br>
            Número do usuário: ${n}<br>
            ${msg}
            <hr>
        `);
    }

    partidas.reverse();

    // imprime tudo invertido
    output.innerHTML = partidas.join("");

    output.innerHTML += `
        <h2>Placar Final</h2>
        Usuário: ${pontosUsuario}<br>
        Máquina: ${pontosMaquina}<br>
    `;
}

</script>
